name: Daily trip report

# Runs in GitHub's cloud — works even when Michel's Mac is off.
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}     # manual "Run workflow" button
  push:
    branches: [main]        # rebuild + redeploy the page on push…
    paths-ignore:           # …but NOT for docs-only commits (saves SerpApi quota)
      - '**.md'

# No workflow-wide permissions: each job requests only what it needs (below).
permissions: {}

# Avoid overlapping deploys
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # This job runs update_report.py against untrusted upstream APIs, so it holds
    # only contents:write (to commit the report back) — no Pages/OIDC powers.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5   # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065   # v5
        with:
          python-version: "3.12"

      - name: Build report (weather ranking + per-venue flights + HTML)
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python3 trip-ni-july-2026/scripts/update_report.py

      - name: Build knowledge base (Markdown → HTML for GitHub Pages)
        run: python3 trip-ni-july-2026/scripts/build_knowledge.py

      - name: Commit changes if any
        run: |
          git config user.name  "trip-bot"
          git config user.email "actions@github.com"
          git add index.html .nojekyll trip-ni-july-2026/daily-report.md \
                  trip-ni-july-2026/history/ trip-ni-july-2026/flights-latest.json \
                  knowledge/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "report: daily update ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Stage site/ (publish only the page + knowledge — not scripts, CSVs, PLAN.md)
        run: |
          rm -rf site && mkdir -p site
          cp index.html site/
          cp .nojekyll site/ 2>/dev/null || true
          cp -R knowledge site/knowledge

      - name: Upload page artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa   # v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only the deploy job holds the Pages/OIDC powers — and nothing else.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e   # v4
