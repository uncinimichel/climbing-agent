name: DB backup to S3

# Nightly full pg_dump of the CLOUD corpus DB (the database of record —
# decision #38) into the versioned, encrypted backup bucket. Runs entirely in
# the cloud: no laptop involved. The runner's IP is allowed into the DB
# security group for the duration of the dump only, then revoked (the revoke
# runs even when the dump fails).
#
# Identity: IAM user gh-db-backup — minimal policy (read the one secret,
# punch/revoke the one SG, put dumps/*). NOTE: the SG id is baked into that
# policy; if the stack is ever REPLACED the backup fails loudly until the
# policy's SG arn is refreshed.
on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  dump:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BACKUP_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BACKUP_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-2
      BUCKET: climbing-agent-db-backups-166832185275
    steps:
      - name: postgres 18 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client-18
      - name: dump to S3 (SG open only while dumping)
        run: |
          set -euo pipefail
          SG=$(aws cloudformation describe-stacks --stack-name ClimbingAgentCorpusDb \
            --query "Stacks[0].Outputs[?OutputKey=='SecurityGroupId'].OutputValue" --output text)
          MYIP=$(curl -s https://checkip.amazonaws.com)
          revoke() { aws ec2 revoke-security-group-ingress --group-id "$SG" \
            --protocol tcp --port 5432 --cidr "$MYIP/32" || true; }
          trap revoke EXIT
          aws ec2 authorize-security-group-ingress --group-id "$SG" \
            --protocol tcp --port 5432 --cidr "$MYIP/32"
          eval "$(aws secretsmanager get-secret-value --secret-id climbing-agent/corpus-db \
            --query SecretString --output text | python3 -c '
          import json, sys
          s = json.load(sys.stdin)
          print("H=%s\nP=%s\nU=%s\nPW=%s" % (s["host"], s["port"], s["username"], s["password"]))')"
          curl -sf https://truststore.pki.rds.amazonaws.com/eu-west-2/eu-west-2-bundle.pem -o /tmp/rds-ca.pem
          STAMP=$(date -u +%Y%m%d-%H%M)
          pg_dump "postgresql://$U:$PW@$H:$P/climbing?sslmode=verify-full&sslrootcert=/tmp/rds-ca.pem" \
            --clean --if-exists | gzip > "/tmp/climbing-$STAMP.sql.gz"
          test "$(stat -c%s "/tmp/climbing-$STAMP.sql.gz")" -gt 20000  # refuse to archive an empty DB
          aws s3 cp "/tmp/climbing-$STAMP.sql.gz" "s3://$BUCKET/dumps/climbing-$STAMP.sql.gz"
          echo "archived s3://$BUCKET/dumps/climbing-$STAMP.sql.gz"
