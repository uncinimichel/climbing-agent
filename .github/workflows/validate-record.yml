name: Validate record

# The JSON record is the database (decision #39); this is its integrity
# constraint layer. Every change to db/record/ re-validates every route
# against the taxonomy-generated schema + the referential lint. A bad tag
# fails here the way an FK violation used to fail in Postgres.
on:
  push:
    branches: [main]
    paths: ["db/record/**", "db/tools/store.py", "db/tools/lint_record.py"]
  pull_request:
    paths: ["db/record/**", "db/tools/store.py", "db/tools/lint_record.py"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v5
      - uses: actions/setup-python@e9aba2c848f5ebd159c070c61ea2c4e2b122355e # v6
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - run: python db/tools/lint_record.py
