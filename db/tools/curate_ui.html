<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Curation Studio</title>
<style>
  :root{
    --paper:#EAECE7; --panel:#F3F4F0; --panel-2:#E1E4DD; --ink:#232A27; --muted:#616B64; --faint:#8A938C;
    --line:#D2D6CE; --line-2:#C3C8BE;
    --accent:#5E6B14; --accent-soft:#E7EBCF; --accent-ink:#3F4A0D;
    --blue:#2F6076; --blue-soft:#DAE6EB;
    --amber:#9A6A12; --amber-soft:#F3E6C9;
    --red:#8C3B2E; --red-soft:#F0DAD5;
    --shadow:0 1px 2px rgba(35,42,39,.06),0 6px 18px rgba(35,42,39,.06);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --serif:ui-serif,"Iowan Old Style",Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --paper:#171B19; --panel:#1F2421; --panel-2:#272D29; --ink:#E7EBE4; --muted:#9BA59D; --faint:#6E786F;
    --line:#2E332F; --line-2:#3A413B; --accent:#A9BF4E; --accent-soft:#2C3316; --accent-ink:#C7D97A;
    --blue:#79B0C6; --blue-soft:#1B2C34; --amber:#D6A94E; --amber-soft:#332711;
    --red:#D08573; --red-soft:#3A211C;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.28);}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.45;font-size:14px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:18px 20px 130px}
  header.app{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  h1{font-family:var(--serif);font-size:22px;font-weight:600;margin:0;white-space:nowrap}
  .progress{flex:1;min-width:200px}
  .pbar{height:8px;border-radius:99px;background:var(--panel-2);overflow:hidden;border:1px solid var(--line)}
  .pbar i{display:block;height:100%;width:0;background:var(--accent);transition:width .3s}
  .plabel{font-size:11.5px;color:var(--muted);margin-top:3px}
  .views{display:flex;border:1px solid var(--line-2);border-radius:9px;overflow:hidden}
  .views button{border:0;background:var(--panel);color:var(--muted);font:600 12.5px var(--sans);padding:7px 14px;cursor:pointer}
  .views button.on{background:var(--accent);color:#fff}
  input.search{border:1px solid var(--line-2);border-radius:8px;background:var(--panel);color:var(--ink);padding:7px 10px;font:12.5px var(--sans);width:170px}

  .queue{display:grid;grid-template-columns:1fr 330px;gap:14px;align-items:start}
  .card{background:var(--panel);border:1px solid var(--line-2);border-radius:14px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:12px}
  .rt-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .rt-head h2{font-family:var(--serif);font-size:21px;margin:0;font-weight:600}
  .grade{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--accent-ink)}
  @media (prefers-color-scheme:dark){.grade{color:var(--accent)}}
  .crag{font-size:12px;color:var(--muted);width:100%}
  .statuschip{margin-left:auto;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;
    padding:4px 10px;border-radius:99px;border:1.5px dashed var(--amber);color:var(--amber);background:var(--amber-soft);white-space:nowrap}
  .statuschip.pub{border-style:solid;border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
  .statuschip.field{border-color:var(--blue);color:var(--blue);background:var(--blue-soft)}
  .statuschip.quar{border-color:var(--red);color:var(--red);background:var(--red-soft)}

  .facts{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:8px;margin:14px 0 4px}
  .fact{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:6px 9px}
  .fact b{display:block;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700}
  .fact input,.fact select{width:100%;border:0;background:transparent;color:var(--ink);font:600 12.5px var(--mono);padding:1px 0;outline:none}
  .fact.miss{border:1.5px dashed var(--amber);background:var(--amber-soft)}
  .sec{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:14px 0 6px}
  .sec small{font-weight:400;text-transform:none;letter-spacing:0}
  .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .chip{font-size:12px;padding:3px 10px;border-radius:99px;border:1.5px dashed var(--amber);background:var(--amber-soft);cursor:pointer;user-select:none}
  .chip.human{border-style:solid;border-color:var(--accent);background:var(--accent-soft)}
  .chip.haz{border-color:var(--red);background:var(--red-soft)}
  .chip:hover{text-decoration:line-through}
  .chips select{font-size:11.5px;border:1.5px dashed var(--line-2);border-radius:99px;background:var(--panel);color:var(--faint);padding:3px 6px}
  .gaps{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .stars{font-size:18px;letter-spacing:2px;cursor:pointer;color:var(--faint);user-select:none}
  .stars .lit{color:var(--amber)}
  .season{display:flex;gap:2px;align-items:flex-end;height:26px}
  .season i{width:14px;background:var(--panel-2);border:1px solid var(--line);border-radius:2px 2px 0 0;display:block;height:8px;cursor:pointer;font-size:0}
  .season i.on{background:var(--accent);border-color:var(--accent);height:20px}
  textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--ink);font:12.5px/1.5 var(--sans);resize:vertical}
  .pitchrow{display:grid;grid-template-columns:34px 54px 64px 1fr 26px;gap:6px;margin-bottom:6px;align-items:start}
  .pitchrow input,.pitchrow textarea{border:1px solid var(--line);border-radius:6px;background:var(--panel-2);color:var(--ink);padding:5px 7px;font:12px var(--sans)}
  .pitchrow textarea{min-height:34px}
  .pitchrow button{border:0;background:none;color:var(--red);cursor:pointer;font-size:14px;padding-top:6px}
  .minor{font-size:11.5px;color:var(--faint)}
  .btn{border:1px solid var(--line-2);background:var(--panel-2);color:var(--ink);border-radius:9px;padding:8px 15px;font:600 13px var(--sans);cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.danger{color:var(--red);border-color:var(--red)}
  .btn.field{color:var(--blue);border-color:var(--blue)}
  .btn.sm{padding:4px 10px;font-size:11.5px;border-radius:7px}
  kbd{font-family:var(--mono);font-size:10px;background:var(--paper);border:1px solid var(--line-2);border-bottom-width:2px;border-radius:4px;padding:1px 4px;margin-left:5px;color:var(--muted)}

  .rail .card{padding:12px 14px}
  .rail h3{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:0 0 7px;font-weight:700}
  .srcs{display:flex;gap:6px;flex-wrap:wrap}
  .src{font-size:11.5px;border:1px solid var(--blue);color:var(--blue);background:var(--blue-soft);padding:3px 9px;border-radius:99px;text-decoration:none}
  .receipt{font-size:11.5px;color:var(--muted)}
  .receipt code{font-family:var(--mono);font-size:10.5px}
  iframe.map{width:100%;height:180px;border:1px solid var(--line-2);border-radius:9px}

  .actions{position:fixed;left:0;right:0;bottom:0;background:var(--panel);border-top:1px solid var(--line-2);box-shadow:0 -6px 18px rgba(35,42,39,.12);z-index:20}
  .actions .in{max-width:1240px;margin:0 auto;padding:10px 20px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .nexthint{margin-left:auto;font-size:12px;color:var(--faint)}
  #toast{position:fixed;top:14px;right:14px;background:var(--accent);color:#fff;padding:8px 16px;border-radius:9px;font-size:12.5px;opacity:0;transition:opacity .25s;z-index:30;pointer-events:none}

  .gridview{display:none}
  .bulk{display:flex;gap:8px;align-items:center;background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--accent-ink);margin-bottom:10px;flex-wrap:wrap}
  .bulk select{font:600 12px var(--sans);border:1px solid var(--line-2);border-radius:7px;padding:4px 8px;background:var(--panel);color:var(--ink)}
  .tblwrap{overflow-x:auto;border:1px solid var(--line-2);border-radius:12px;background:var(--panel);box-shadow:var(--shadow)}
  table{border-collapse:collapse;width:100%;font-size:12.5px;min-width:860px}
  th{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);text-align:left;padding:9px 11px;border-bottom:1px solid var(--line-2);background:var(--panel-2);position:sticky;top:0}
  td{padding:8px 11px;border-bottom:1px solid var(--line)}
  tr:hover td{background:var(--panel-2)}
  td.mono{font-family:var(--mono);font-size:12px}
  .st{font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:99px;white-space:nowrap}
  .st.d{border:1.5px dashed var(--amber);color:var(--amber);background:var(--amber-soft)}
  .st.p{border:1.5px solid var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
  .st.f{border:1.5px solid var(--blue);color:var(--blue);background:var(--blue-soft)}
  @media (max-width:900px){.queue{grid-template-columns:1fr}}
</style>

<div class="wrap">
  <header class="app">
    <h1>🧗 Curation Studio</h1>
    <div class="progress"><div class="pbar"><i id="pfill"></i></div><div class="plabel" id="plabel">loading…</div></div>
    <input class="search" id="q" placeholder="filter name / crag…">
    <select class="search" id="statusFilter" style="width:auto">
      <option value="draft">drafts</option><option value="publish">published</option><option value="quarantined">quarantined</option>
    </select>
    <div class="views">
      <button id="vq" class="on" onclick="setView('q')">Queue</button>
      <button id="vg" onclick="setView('g')">Grid</button>
    </div>
  </header>

  <div class="queue" id="queueview">
    <div id="main"><div class="card">loading…</div></div>
    <div class="rail" id="rail"></div>
  </div>

  <div class="gridview" id="gridview">
    <div class="bulk">
      <span id="selcount">0 selected</span> —
      <select id="bulkField"><option value="sun_window_code">sunWindow</option><option value="stars">stars</option><option value="protection_style">protectionStyle</option><option value="belays">belays</option></select>
      <select id="bulkValue"></select>
      <button class="btn sm" onclick="bulkApply()">apply to selected</button>
      <span class="minor" style="margin-left:auto">bulk never publishes — status flips stay per-route</span>
    </div>
    <div class="tblwrap"><table>
      <thead><tr><th></th><th>route</th><th>crag</th><th>grade</th><th>len</th><th>pit</th><th>★</th><th>intro</th><th>pitch rows</th><th>status</th></tr></thead>
      <tbody id="gbody"></tbody>
    </table></div>
  </div>
</div>

<div class="actions"><div class="in">
  <button class="btn primary" onclick="publish()">✓ Publish<kbd>⌘⏎</kbd></button>
  <button class="btn field" onclick="fieldcheck()">🥾 Field check<kbd>⌘F</kbd></button>
  <button class="btn danger" onclick="quarantine()">✕ Quarantine</button>
  <button class="btn" onclick="move(1)">Next<kbd>⌘→</kbd></button>
  <button class="btn" onclick="move(-1)">Prev<kbd>⌘←</kbd></button>
  <button class="btn" onclick="exportCorpus()" title="write db/corpus.json from Postgres">⇩ Export corpus.json</button>
  <span class="nexthint" id="nexthint"></span>
</div></div>
<div id="toast"></div>

<script>
let ENUMS={}, QUEUE=[], COUNTS={}, cur=0, R=null, saveTimers={};
const $=id=>document.getElementById(id);
const api=(p,opt)=>fetch('/api'+p,opt).then(r=>{if(!r.ok)return r.json().then(e=>{throw e.detail||r.status});return r.json()});
const toast=m=>{const t=$('toast');t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,1400)};

async function boot(){
  ENUMS=await api('/enums');
  bulkFieldChanged();
  await loadQueue();
}
async function loadQueue(keepId){
  const q=$('q').value, st=$('statusFilter').value;
  const d=await api(`/queue?status=${st}&q=${encodeURIComponent(q)}`);
  QUEUE=d.rows; COUNTS=d.counts;
  const total=(COUNTS.draft||0)+(COUNTS.publish||0)+(COUNTS.quarantined||0);
  $('pfill').style.width=(100*(COUNTS.publish||0)/Math.max(1,total))+'%';
  $('plabel').textContent=`${COUNTS.publish||0} curated · ${COUNTS.draft||0} drafts · ${COUNTS.quarantined||0} quarantined · ${COUNTS.field_check||0} 🥾 field-check`;
  if(keepId){const i=QUEUE.findIndex(r=>r.id===keepId); cur=i>=0?i:Math.min(cur,QUEUE.length-1);}
  cur=Math.max(0,Math.min(cur,QUEUE.length-1));
  renderGrid();
  if(QUEUE.length)await openRoute(QUEUE[cur].id); else {$('main').innerHTML='<div class="card">queue empty 🎉</div>';$('rail').innerHTML='';}
}
async function openRoute(id){
  R=await api('/route/'+id);
  renderCard(); renderRail();
  $('nexthint').textContent=`route ${cur+1}/${QUEUE.length}${QUEUE[cur+1]?' — next: '+QUEUE[cur+1].name:''}`;
}
function move(d){cur=Math.max(0,Math.min(QUEUE.length-1,cur+d));openRoute(QUEUE[cur].id)}

// ── autosave helpers ─────────────────────────────
function save(field,value){
  clearTimeout(saveTimers[field]);
  saveTimers[field]=setTimeout(async()=>{
    try{await api('/route/'+R.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({[field]:value})});toast('saved '+field)}
    catch(e){toast('⚠ '+e)}
  },450);
}
function saveTags(){
  api('/route/'+R.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({tags:R.tags})})
    .then(()=>toast('tags saved')).catch(e=>toast('⚠ '+e));
}

// ── queue card ─────────────────────────────
const FAMS=[['disciplines',''],['features',''],['character',''],['hazards','haz']];
function factInput(label,field,val,opts,missing){
  const cls='fact'+(missing&&(val===null||val===undefined||val==='')?' miss':'');
  if(opts){
    const sel=`<select onchange="save('${field}',this.value||null)"><option value=""></option>`+
      opts.map(o=>`<option ${o==val?'selected':''}>${o}</option>`).join('')+`</select>`;
    return `<div class="${cls}"><b>${label}</b>${sel}</div>`;
  }
  return `<div class="${cls}"><b>${label}</b><input value="${val??''}" onchange="save('${field}',this.value===''?null:(isNaN(this.value)?this.value:+this.value))"></div>`;
}
function renderCard(){
  const r=R, s=r.status, chipCls=r.tagged_by==='human'?'human':'';
  const seasonSet=new Set(r.best_season||[]);
  $('main').innerHTML=`
  <div class="card">
    <div class="rt-head"><h2>${r.name}</h2><span class="grade">${r.original_grade||'—'}</span>
      <span class="statuschip ${s==='publish'?'pub':s==='quarantined'?'quar':r.needs_field_check?'field':''}">
        ${s==='publish'?'✓ published':s==='quarantined'?'✕ quarantined':(r.needs_field_check?'🥾 field check':'draft · '+r.tagged_by+'-tagged')}</span>
      <span class="crag">${(r.path_tokens||[]).join(' › ')} · ${r.eff_rock_code||'rock?'} · ${r.eff_aspect||'aspect?'} · <span style="font-family:var(--mono)">#${r.id}</span></span></div>
    <div class="facts">
      ${factInput('grade','original_grade',r.original_grade)}
      ${factInput('length m','length_m',r.length_m)}
      ${factInput('pitches','pitches_count',r.pitches_count)}
      ${factInput('incline','incline_code',r.incline_code,ENUMS.incline)}
      ${factInput('protection','protection_code',r.protection_code,ENUMS.protection)}
      ${factInput('prot. style','protection_style',r.protection_style,ENUMS.protection_style,true)}
      ${factInput('belays','belays',r.belays,ENUMS.belays,true)}
      ${factInput('elevation m','elevation_m',r.elevation_m,null,true)}
      ${factInput('sun window','sun_window_code',r.sun_window_code,ENUMS.sun_window,true)}
      ${factInput('approach min','approach_time_min',r.approach_time_min)}
      ${factInput('descent','descent_method',r.descent_method,ENUMS.descent_method,true)}
      ${factInput('rack','rack',r.rack,null,true)}
    </div>
    <div class="sec">tags <small>— click to drop · dashed = ${r.tagged_by}-tagged, solid = human-verified · they turn solid on publish</small></div>
    ${FAMS.map(([f,extra])=>`<div class="chips" style="margin-bottom:5px">
        <span class="minor" style="width:76px">${f}</span>
        ${(r.tags[f]||[]).map(t=>`<span class="chip ${chipCls} ${extra}" onclick="dropTag('${f}','${t}')">${t}</span>`).join('')}
        <select onchange="addTag('${f}',this.value);this.value=''"><option value="">+ add</option>
          ${(ENUMS[f]||[]).filter(v=>!(r.tags[f]||[]).includes(v)).map(v=>`<option>${v}</option>`).join('')}</select>
      </div>`).join('')}
    <div class="sec">fill the gaps</div>
    <div class="gaps">
      <span class="stars" title="stars">${[1,2,3].map(i=>`<span class="${(r.stars||0)>=i?'lit':''}" onclick="setStars(${i})">★</span>`).join('')}</span>
      <span class="season" title="bestSeason — click months">${[...Array(12)].map((_,i)=>`<i class="${seasonSet.has(i+1)?'on':''}" onclick="toggleMonth(${i+1})">${i+1}</i>`).join('')}</span>
      <span class="minor">← stars &amp; best months</span>
    </div>
  </div>
  <div class="card">
    <div class="sec">intro <small>— why climb it, crux, character, caveats (your house style)</small></div>
    <textarea rows="4" onchange="save('intro_html',this.value||null)">${esc(r.intro_html)}</textarea>
    <div class="sec">approach &amp; descent <small>— parking coords, timings, hazards</small></div>
    <textarea rows="4" onchange="save('approach_html',this.value||null)">${esc(r.approach_html)}</textarea>
    <div class="sec">pitch by pitch <small>— structured; the site's pitchInfo renders from these</small></div>
    <div id="pitches">${(r.pitch_rows||[]).map(pitchRowHtml).join('')}</div>
    <button class="btn sm" onclick="addPitch()">+ pitch</button>
    <button class="btn sm" onclick="savePitches()">save pitches</button>
    <div class="sec">curator note <small>— travels with the row (also what a field check should do)</small></div>
    <textarea rows="2" onchange="save('curation_notes',this.value||null)">${esc(r.curation_notes)}</textarea>
  </div>`;
}
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
function pitchRowHtml(p,i){
  return `<div class="pitchrow" data-i="${i}">
    <input value="${p.number||i+1}" title="No.">
    <input value="${p.length_m??''}" placeholder="m" title="length m">
    <input value="${p.original_grade??''}" placeholder="grade" title="grade">
    <textarea placeholder="moves, crux, belay…">${esc(p.description)}</textarea>
    <button onclick="this.parentNode.remove()" title="remove">✕</button></div>`;
}
function addPitch(){const d=document.createElement('div');d.innerHTML=pitchRowHtml({number:document.querySelectorAll('.pitchrow').length+1},99);$('pitches').appendChild(d.firstChild)}
async function savePitches(){
  const rows=[...document.querySelectorAll('.pitchrow')].map(el=>{
    const [n,l,g]=el.querySelectorAll('input');
    return {number:+n.value||null,length_m:l.value?+l.value:null,original_grade:g.value||null,
            grade_system_code:R.grade_system_code||null,description:el.querySelector('textarea').value||null};
  }).filter(p=>p.number);
  try{await api('/route/'+R.id+'/pitches',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(rows)});toast(rows.length+' pitches saved')}catch(e){toast('⚠ '+e)}
}
function dropTag(f,t){R.tags[f]=R.tags[f].filter(x=>x!==t);saveTags();renderCard()}
function addTag(f,t){if(!t)return;R.tags[f]=[...(R.tags[f]||[]),t];saveTags();renderCard()}
function setStars(n){R.stars=(R.stars===n?n-1:n)||null;save('stars',R.stars);renderCard()}
function toggleMonth(m){const s=new Set(R.best_season||[]);s.has(m)?s.delete(m):s.add(m);R.best_season=[...s].sort((a,b)=>a-b);save('best_season',R.best_season.length?R.best_season:null);renderCard()}

// ── evidence rail ─────────────────────────────
function renderRail(){
  const r=R, name=encodeURIComponent(r.name), crag=encodeURIComponent((r.path_tokens||[]).slice(-1)[0]||'');
  const mp=(r.refs||[]).find(x=>x.source_id==='multipitch');
  const links=[
    mp?`<a class="src" target="_blank" href="https://www.multi-pitch.com/">multi-pitch #${mp.external_id} ↗</a>`:'',
    ...(r.refs||[]).filter(x=>x.source_id!=='multipitch'&&x.url).map(x=>`<a class="src" target="_blank" href="${x.url}">${x.source_id} ↗</a>`),
    `<a class="src" target="_blank" href="https://www.ukclimbing.com/logbook/search/?query=${name}">UKC search ↗</a>`,
    `<a class="src" target="_blank" href="https://www.google.com/search?q=${name}+${crag}+climb">Google ↗</a>`].join('');
  const rec=r.receipt?`<div class="receipt">model <code>${r.receipt._prov?.model||'?'}</code> on <code>${r.receipt._prov?.date||'?'}</code> inferred:
      ${['features','character','protection','discipline'].filter(k=>r.receipt[k]).map(k=>`<br>· <b>${k}</b>: ${[].concat(r.receipt[k]).join(', ')}`).join('')}
      <br><span class="minor">accept = leave the chip; wrong = click it off</span></div>`
    :'<div class="receipt minor">no AI receipt (tags came with the source or a human)</div>';
  const map=r.lat?`<iframe class="map" loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${r.lon-0.02}%2C${r.lat-0.012}%2C${r.lon+0.02}%2C${r.lat+0.012}&layer=mapnik&marker=${r.lat}%2C${r.lon}"></iframe>
      <div class="minor" style="margin-top:4px"><a target="_blank" href="https://www.openstreetmap.org/?mlat=${r.lat}&mlon=${r.lon}#map=15/${r.lat}/${r.lon}">${r.lat.toFixed(4)}, ${r.lon.toFixed(4)} — open ↗</a></div>`
    :'<div class="minor">⚠ no coordinates — fix before publish</div>';
  $('rail').innerHTML=`
    <div class="card"><h3>Sources</h3><div class="srcs">${links}</div></div>
    <div class="card"><h3>AI tag receipt</h3>${rec}</div>
    <div class="card"><h3>Map — verify the pin</h3>${map}</div>
    <div class="card"><h3>Climatology</h3><div class="minor">${(r.climatology||[]).length?
      r.climatology.map(m=>`${'JFMAMJJASOND'[m.month-1]}:${Math.round(m.rainy_days??0)}d`).join(' '):'none'}
      <br>rainy days/month (source data)</div></div>`;
}

// ── actions ─────────────────────────────
async function publish(){
  try{await api('/route/'+R.id+'/publish',{method:'POST'});toast('✓ published — tags now human');await loadQueue();}
  catch(e){toast('⚠ '+e)}
}
async function quarantine(){
  try{await api('/route/'+R.id+'/status/quarantined',{method:'POST'});toast('quarantined');await loadQueue();}
  catch(e){toast('⚠ '+e)}
}
async function fieldcheck(){
  const d=await api('/route/'+R.id+'/fieldcheck',{method:'POST'});
  R.needs_field_check=d.needs_field_check;toast(d.needs_field_check?'🥾 flagged for field check':'flag removed');renderCard();loadQueue(R.id);
}
async function exportCorpus(){
  toast('exporting…');
  try{const d=await api('/export',{method:'POST'});toast('✓ '+d.out.slice(0,80))}catch(e){toast('⚠ '+e)}
}

// ── grid ─────────────────────────────
function renderGrid(){
  $('gbody').innerHTML=QUEUE.map((r,i)=>`
   <tr onclick="cur=${i};setView('q');openRoute(${r.id})" style="cursor:pointer">
    <td><input type="checkbox" data-id="${r.id}" onclick="event.stopPropagation();selCount()"></td>
    <td><b>${r.name}</b></td><td>${(r.path_tokens||[]).slice(2).join(' › ')||(r.path_tokens||[]).join(' › ')}</td>
    <td class="mono">${r.original_grade||'—'}</td><td class="mono">${r.length_m||''}</td><td class="mono">${r.pitches_count||''}</td>
    <td>${'★'.repeat(r.stars||0)||'—'}</td>
    <td>${r.has_intro?'✓':'—'}</td><td class="mono">${r.n_pitches_rows||0}</td>
    <td><span class="st ${r.status==='publish'?'p':r.needs_field_check?'f':'d'}">${r.status==='publish'?'✓ pub':r.needs_field_check?'🥾':'draft'}</span></td></tr>`).join('');
  selCount();
}
function selCount(){const n=document.querySelectorAll('#gbody input:checked').length;$('selcount').textContent=n+' selected'}
function bulkFieldChanged(){
  const f=$('bulkField').value;
  const opts=f==='stars'?['1','2','3']:f==='sun_window_code'?ENUMS.sun_window:f==='belays'?ENUMS.belays:ENUMS.protection_style;
  $('bulkValue').innerHTML=(opts||[]).map(o=>`<option>${o}</option>`).join('');
}
$('bulkField').onchange=bulkFieldChanged;
async function bulkApply(){
  const f=$('bulkField').value; let v=$('bulkValue').value; if(f==='stars')v=+v;
  const ids=[...document.querySelectorAll('#gbody input:checked')].map(x=>+x.dataset.id);
  for(const id of ids)await api('/route/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({[f]:v})});
  toast(`set ${f} on ${ids.length} routes`);loadQueue(R?.id);
}

function setView(v){
  $('queueview').style.display=v==='q'?'grid':'none';
  $('gridview').style.display=v==='g'?'block':'none';
  $('vq').classList.toggle('on',v==='q');$('vg').classList.toggle('on',v==='g');
}
document.addEventListener('keydown',e=>{
  if(!(e.metaKey||e.ctrlKey))return;
  if(e.key==='Enter'){e.preventDefault();publish()}
  if(e.key==='ArrowRight'){e.preventDefault();move(1)}
  if(e.key==='ArrowLeft'){e.preventDefault();move(-1)}
  if(e.key.toLowerCase()==='f'){e.preventDefault();fieldcheck()}
});
$('q').addEventListener('input',()=>{clearTimeout(saveTimers._q);saveTimers._q=setTimeout(()=>loadQueue(),350)});
$('statusFilter').onchange=()=>{cur=0;loadQueue()};
boot();
</script>
</html>
